// BEGINNER_COMMENTED_BY_CODEX: 本文件已加入面向初学者的中文说明。
// 说明：声明 Gradle 插件区域，插件会给项目增加构建能力。
plugins {
    // 说明：启用一个 Gradle 插件。
    id "application"
    // 说明：启用一个 Gradle 插件。
    id "org.openjfx.javafxplugin" version "0.1.0"
// 说明：结束当前 Gradle 配置块。
}

// 说明：设置 Gradle 配置项的值。
group = "app.musicplayer"
// 说明：设置 Gradle 配置项的值。
version = "1.0.0"

// 说明：配置 Java 编译环境。
java {
    // 说明：开始一个 Gradle 配置块，里面的配置属于这个主题。
    toolchain {
        // 说明：设置 Gradle 配置项的值。
        languageVersion = JavaLanguageVersion.of(25)
    // 说明：结束当前 Gradle 配置块。
    }
// 说明：结束当前 Gradle 配置块。
}

// 说明：配置应用入口类和运行参数。
application {
    // 说明：设置 Gradle 配置项的值。
    mainClass = "app.musicplayer.MusicPlayerApp"
    // 说明：设置 Gradle 配置项的值。
    applicationDefaultJvmArgs = [
            // 说明：设置 Gradle 配置项的值。
            "--enable-native-access=ALL-UNNAMED",
            // 说明：设置 Gradle 配置项的值。
            "--enable-native-access=javafx.graphics",
            // 说明：设置 Gradle 配置项的值。
            "--enable-native-access=javafx.media"
    // 说明：Gradle 构建脚本的一行配置。
    ]
// 说明：结束当前 Gradle 配置块。
}

// 说明：配置 Java 编译环境。
javafx {
    // 说明：设置 Gradle 配置项的值。
    version = "25.0.1"
    // 说明：设置 Gradle 配置项的值。
    modules = ["javafx.controls", "javafx.media"]
// 说明：结束当前 Gradle 配置块。
}

// 说明：声明项目依赖，Gradle 会自动下载这些库。
dependencies {
    // 说明：添加运行和编译都需要的第三方依赖。
    implementation "org.xerial:sqlite-jdbc:3.50.3.0"
    // 说明：添加运行和编译都需要的第三方依赖。
    implementation "org.jsoup:jsoup:1.18.3"
// 说明：结束当前 Gradle 配置块。
}

// 说明：开始一个 Gradle 配置块，里面的配置属于这个主题。
tasks.withType(JavaCompile).configureEach {
    // 说明：设置 Gradle 配置项的值。
    options.encoding = "UTF-8"
// 说明：结束当前 Gradle 配置块。
}

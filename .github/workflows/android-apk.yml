name: Android APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Enable Gradle wrapper
        run: chmod +x gradlew

      - name: Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libasound2-dev libavcodec-dev libavformat-dev libavutil-dev libgl-dev libgtk-3-dev libx11-dev libxtst-dev unzip wget

      - name: Set up Gluon GraalVM
        uses: gluonhq/setup-graalvm@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          graalvm: 22.1.0.1-Final
          jdk: java17
          arch: x86_64

      - name: Verify JVM build
        run: ./gradlew clean test -Ptarget=android --no-daemon --console=plain

      - name: Build Android APK
        run: ./gradlew nativeBuild nativePackage -Ptarget=android --no-daemon --stacktrace --console=plain

      - name: Collect APK
        if: always()
        shell: bash
        run: |
          mkdir -p build/android-artifacts
          find build -type f -name '*.apk' -exec cp -v {} build/android-artifacts/ \;

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simple-music-player-android
          path: build/android-artifacts
          if-no-files-found: warn
